name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    env:
      CI: true
      NODE_ENV: test
      STORE_MODE: memory
      DATABASE_URL: ''
      UPSTASH_REDIS_REST_URL: ''
      UPSTASH_REDIS_REST_TOKEN: ''
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      TRUST_PROXY: 'false'

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test, build]

    env:
      CI: true
      NODE_ENV: test
      STORE_MODE: memory
      DATABASE_URL: ''
      UPSTASH_REDIS_REST_URL: ''
      UPSTASH_REDIS_REST_TOKEN: ''
      TRUST_PROXY: 'false'
      E2E_PORT: 4173
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
      PLAYWRIGHT_REUSE_SERVER: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle for E2E
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t numduel-ci:${{ github.sha }} .

      - name: Start Docker image
        run: |
          docker run -d --name numduel-ci -p 3000:3000 \
            -e NODE_ENV=production \
            -e SESSION_SECRET=ci-session-secret \
            -e APP_BASE_URL=http://127.0.0.1:3000 \
            -e CORS_ORIGINS=http://127.0.0.1:3000 \
            -e SOCKET_CORS_ORIGINS=http://127.0.0.1:3000 \
            numduel-ci:${{ github.sha }}

      - name: Wait for health endpoint
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          docker logs numduel-ci
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs numduel-ci

      - name: Stop Docker container
        if: always()
        run: docker rm -f numduel-ci

  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [docker]
    if: >-
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker Hub credentials
        id: dockerhub-creds
        shell: bash
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Docker Hub publish because DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not configured."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.dockerhub-creds.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dockerhub-creds.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.dockerhub-creds.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/multiplayer-number-guesser
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.dockerhub-creds.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish skipped
        if: steps.dockerhub-creds.outputs.ready != 'true'
        run: echo "Docker Hub publish skipped. Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to enable image publishing."
