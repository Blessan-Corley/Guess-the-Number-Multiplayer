services:
  app:
    build:
      context: .
    ports:
      - '${HOST_PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      STORE_MODE: ${STORE_MODE:-redis}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-300000}
      RECONNECT_GRACE_PERIOD_MS: ${RECONNECT_GRACE_PERIOD_MS:-120000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-number-guesser:docker:}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/number_guesser}
      DATABASE_SSL_REJECT_UNAUTHORIZED: 'false'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SOCKET_CORS_ORIGINS: ${SOCKET_CORS_ORIGINS:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-number_guesser}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-number_guesser}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
